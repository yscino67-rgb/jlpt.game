<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 단어장 게임</title>
<link rel="stylesheet" href="style.css">
</head>


<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f4f4;
  text-align: center;
  padding: 15px;
}

h1 {
  font-size: 24px;
}

.hidden {
  display: none;
}
 
.word-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  max-width: 430px;
  margin: 0 auto 20px;
}

.word-item {
  background: white;
  border-radius: 14px;
  padding: 14px 8px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
}

.word-kanji {
  font-size: 22px;
  font-weight: bold;
}

.word-hira {
  font-size: 15px;
  color: #666;
  margin-top: 4px;
}

.word-kr {
  font-size: 15px;
  margin-top: 6px;
}

button {
  margin: 10px 4px;
  font-size: 17px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: #222;
  color: white;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  max-width: 390px;
  margin: 0 auto;
}

.card {
  height: 105px;
  background: #333;
  color: white;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
}

.card.open {
  background: white;
  color: #222;
}

.card.matched {
  background: #4caf50;
  color: white;
  pointer-events: none;
}
.word-item {
  cursor: pointer;
  user-select: none;
}

.state-green {
  background: #8bc34a;
}

.state-blue {
  background: #42a5f5;
  color: white;
}

.state-red {
  background: #ef5350;
  color: white;
}

.state-green .word-hira,
.state-green .word-kr,
.state-blue .word-hira,
.state-blue .word-kr,
.state-red .word-hira,
.state-red .word-kr {
  color: inherit;
}

</style>
</head>

<body>

<h1>JLPT 학습장</h1>

<div style="margin-bottom:20px;">

  <button onclick="showWordPage()">단어장</button>
  <button onclick="showGrammarPage()">문법장</button>
</div>

<div id="wordPage">
  <div id="wordList" class="word-list"></div>
  <button onclick="startGame('meaning')">게임하기</button>
  <button onclick="startGame('reading')">히라가나</button>
</div>


<div id="gamePage" class="hidden">
  <h1>짝 맞추기 게임</h1>
  <div id="info">시도 횟수: 0</div>
  <div class="grid" id="grid"></div>

  <button onclick="startGame()">새 게임</button>
  <button onclick="showWordPage()">단어장 보기</button>
</div>

<div id="grammarPage" class="hidden">
  <div id="grammarList" class="grammar-list"></div>
  <button onclick="startGrammarGame()">순서 배열</button>

</div>

<script>
const words = [
    { kanji: "依然として", hira: "いぜんとして", kr: "여전히" },
  { kanji: "誤り", hira: "あやまり", kr: "잘못, 실수, 착오, 오류" },
  { kanji: "謝り", hira: "あやまり", kr: "사과" },
  { kanji: "言い訳", hira: "いいわけ", kr: "변명" },
  { kanji: "怒り", hira: "いかり", kr: "분노, 화" },
  { kanji: "勢い", hira: "いきおい", kr: "기세" },
  { kanji: "香り", hira: "かおり", kr: "향기" },
  { kanji: "飾り", hira: "かざり", kr: "장식" },
  { kanji: "好み", hira: "このみ", kr: "기호, 취향" },
  { kanji: "締め切り", hira: "しめきり", kr: "마감" },
  { kanji: "強み", hira: "つよみ", kr: "강점" },
  { kanji: "手応え", hira: "てごたえ", kr: "보람" },
  { kanji: "手続き", hira: "てつづき", kr: "수속" },
  { kanji: "仲直り", hira: "なかなおり", kr: "화해" },
  { kanji: "半ば", hira: "なかば", kr: "절반" },
  { kanji: "望み", hira: "のぞみ", kr: "바람, 소망" },
  { kanji: "人込み", hira: "ひとごみ", kr: "인파, 붐빔" },
  { kanji: "誇り", hira: "ほこり", kr: "자랑, 긍지" },
  { kanji: "催し", hira: "もよおし", kr: "개최" },
  { kanji: "最寄り", hira: "もより", kr: "근처, 가장 가까움" },
  { kanji: "世の中", hira: "よのなか", kr: "세상" },
  { kanji: "腕", hira: "うで", kr: "팔, 솜씨" },
  { kanji: "鍵", hira: "かぎ", kr: "열쇠" },
  { kanji: "粉", hira: "こな", kr: "가루" },
  { kanji: "印", hira: "しるし", kr: "표시" },
  { kanji: "姿", hira: "すがた", kr: "모습" },
  { kanji: "隅", hira: "すみ", kr: "구석" },
  { kanji: "袖", hira: "そで", kr: "소매" },
  { kanji: "縦", hira: "たて", kr: "세로" },
  { kanji: "横", hira: "よこ", kr: "가로, 옆" },
  { kanji: "束", hira: "たば", kr: "다발, 묶음" },
  { kanji: "旅", hira: "たび", kr: "여행" },
  { kanji: "立派だ", hira: "りっぱだ", kr: "훌륭하다" },
  { kanji: "盛んだ", hira: "さかんだ", kr: "번창하다" },
  { kanji: "賑やかだ", hira: "にぎやかだ", kr: "번화하다" },
  { kanji: "派手だ", hira: "はでだ", kr: "화려하다" },
  { kanji: "華やかだ", hira: "はなやかだ", kr: "화려하다" },
  { kanji: "居眠り", hira: "いねむり", kr: "앉아서 졺" },
  { kanji: "しっとりだ", hira: "しっとりだ", kr: "촉촉하다" },
  { kanji: "荒れる", hira: "あれる", kr: "거칠어지다" },
  { kanji: "きれいだ", hira: "きれいだ", kr: "예쁘다" },
  { kanji: "汚い", hira: "きたない", kr: "더럽다" },
  { kanji: "量が多い", hira: "りょうがおおい", kr: "양이 많다" },
  { kanji: "おかしな", hira: "おかしな", kr: "이상한" },
  { kanji: "不安な", hira: "ふあんな", kr: "불안한" },
  { kanji: "退屈な", hira: "たいくつな", kr: "지루한" },
  { kanji: "かわいそうな", hira: "かわいそうな", kr: "불쌍한" },
  { kanji: "しきりに", hira: "しきりに", kr: "자주" },
  { kanji: "無理やりに", hira: "むりやりに", kr: "무리하게" },
  { kanji: "おのおの", hira: "おのおの", kr: "각각" },
  { kanji: "あいにく", hira: "あいにく", kr: "공교롭게도" },
  { kanji: "強いて", hira: "しいて", kr: "억지로" },
  { kanji: "上達", hira: "じょうたつ", kr: "실력 향상" },
  { kanji: "比較", hira: "ひかく", kr: "비교" },
  { kanji: "会話", hira: "かいわ", kr: "회화(대화,이야기)" },
{ kanji: "普通", hira: "ふつう", kr: "보통, 대개" },
{ kanji: "夫婦", hira: "ふうふ", kr: "부부" },
{ kanji: "こうした", hira: "こうした", kr: "이러한" },
{ kanji: "珍しい", hira: "めずらしい", kr: "드물다, 신기하다" },
{ kanji: "不満", hira: "ふまん", kr: "불만" },
{ kanji: "抱える", hira: "かかえる", kr: "1.껴안다, 떠안다 2.품다" },
{ kanji: "続ける", hira: "つづける", kr: "계속하다, 이어 나가다" },
{ kanji: "弁護士", hira: "べんごし", kr: "변호사" },
{ kanji: "相談", hira: "そうだん", kr: "상담, 의논" },
{ kanji: "葛藤", hira: "かっとう", kr: "갈등" },
{ kanji: "深い", hira: "ふかい", kr: "깊다, 심각하다" },
{ kanji: "別居", hira: "べっきょ", kr: "별거" },
{ kanji: "至る", hira: "いたる", kr: "도달하다, 이르다" },
{ kanji: "状態", hira: "じょうたい", kr: "상태" },
{ kanji: "結婚当初", hira: "けっこんとうしょ", kr: "결혼 초창기" },
{ kanji: "誕生", hira: "たんじょう", kr: "탄생" },
{ kanji: "きっかけに", hira: "きっかけに", kr: "~를 계기로" },
{ kanji: "不仲", hira: "ふなか", kr: "불화" },
{ kanji: "育児", hira: "いくじ", kr: "육아" },
{ kanji: "負担をめぐる", hira: "ふたんをめぐる", kr: "부담을 둘러싼" },
{ kanji: "積み重なる", hira: "つみかさなる", kr: "축적되다, 겹치다" },
{ kanji: "別れる", hira: "わかれる", kr: "헤어지다" },
{ kanji: "住まい", hira: "すまい", kr: "주거, 집" },
{ kanji: "調整", hira: "ちょうせい", kr: "조정, 조율" },
   
];

let cards = [];
let firstCard = null;
let secondCard = null;
let lock = false;
let tries = 0;
let matchedCount = 0;
let selectedWords = [];
let currentMode = "meaning";

const wordPage = document.getElementById("wordPage");
const gamePage = document.getElementById("gamePage");
const wordList = document.getElementById("wordList");
const grid = document.getElementById("grid");
const info = document.getElementById("info");

let wordStates = {};
function showWordList() {
  wordList.innerHTML = "";

  words.forEach((word) => {
    const div = document.createElement("div");
    div.className = "word-item";
    div.onclick = () => cycleColor(word.kanji, div);

    const state = wordStates[word.kanji] || 0;
    if (state === 1) div.classList.add("state-green");
    if (state === 2) div.classList.add("state-blue");
    if (state === 3) div.classList.add("state-red");

    div.innerHTML = `
      <div class="word-kanji">${word.kanji}</div>
      <div class="word-hira">${word.hira}</div>
      <div class="word-kr">${word.kr}</div>
    `;

    wordList.appendChild(div);
  });
}

function cycleColor(wordKey, div) {
  const current = wordStates[wordKey] || 0;
  const next = (current + 1) % 4;

  wordStates[wordKey] = next;

  div.classList.remove("state-green", "state-blue", "state-red");

  if (next === 1) div.classList.add("state-green");
  if (next === 2) div.classList.add("state-blue");
  if (next === 3) div.classList.add("state-red");
}

function showWordPage() {
  wordPage.classList.remove("hidden");
  gamePage.classList.add("hidden");
  grammarPage.classList.add("hidden");
}

const grammarPage = document.getElementById("grammarPage");
const grammarDiv = document.getElementById("grammarList");

function showGrammarPage() {
  wordPage.classList.add("hidden");
  gamePage.classList.add("hidden");
  grammarPage.classList.remove("hidden");
  renderGrammar();
}

const grammarListData = [
  {
    grammar: "〜ておく",
    meaning: "미리 ~해두다",
    example: "宿題をしておく。"
  },
  {
    grammar: "〜ばかり",
    meaning: "막 ~했다",
    example: "さっき食べたばかりだ。"
  }
];

function renderGrammar() {
  grammarDiv.innerHTML = "";

  grammarListData.forEach((item) => {
    const div = document.createElement("div");
    div.className = "grammar-item";

    div.innerHTML = `
      <div class="grammar-title">${item.grammar}</div>
      <div class="grammar-meaning">${item.meaning}</div>
    `;

    grammarDiv.appendChild(div);
  });
}

function startGame(mode = currentMode) {
  currentMode = mode;
  wordPage.classList.add("hidden");
  gamePage.classList.remove("hidden");

selectedWords = words
  .filter(word => wordStates[word.kanji] !== 3)
  .sort(() => Math.random() - 0.5)
  .slice(0, 6);

 cards = [];

selectedWords.forEach((item, index) => {

  cards.push({
    text: item.kanji,
    pairId: index
  });

  if (mode === "reading") {

    cards.push({
      text: item.hira,
      pairId: index
    });

  } else {

    cards.push({
      text: item.kr,
      pairId: index
    });

  }

});

cards.sort(() => Math.random() - 0.5);

  grid.innerHTML = "";
  firstCard = null;
  secondCard = null;
  lock = false;
  tries = 0;
  matchedCount = 0;
  info.textContent = "시도 횟수: 0";

  cards.forEach((card) => {
    const div = document.createElement("div");
    div.className = "card";
    div.textContent = "?";
    div.onclick = () => openCard(div, card);
    grid.appendChild(div);
  });
}

function openCard(div, card) {
  if (lock) return;
  if (div.classList.contains("open")) return;
  if (div.classList.contains("matched")) return;

  div.textContent = card.text;
  div.classList.add("open");

  if (!firstCard) {
    firstCard = { div, card };
    return;
  }

  secondCard = { div, card };
  tries++;
  info.textContent = "시도 횟수: " + tries;
  if (tries >= 20) {

  setTimeout(() => {


    showWordPage();

  }, 300);

  return;
}

  if (firstCard.card.pairId === secondCard.card.pairId) {
    firstCard.div.classList.add("matched");
    secondCard.div.classList.add("matched");

    firstCard = null;
    secondCard = null;
    matchedCount++;

    if (matchedCount === selectedWords.length) {
      setTimeout(() => {
        alert("완료! 총 시도 횟수: " + tries);
      }, 300);
    }
  } else {
    lock = true;

    setTimeout(() => {
      firstCard.div.textContent = "?";
      secondCard.div.textContent = "?";
      firstCard.div.classList.remove("open");
      secondCard.div.classList.remove("open");

      firstCard = null;
      secondCard = null;
      lock = false;
    }, 350);
  }
}

showWordList();
</script>

</body>
</html>
